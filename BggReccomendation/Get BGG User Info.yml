info:
  name: Get BGG User Info
  type: http
  seq: 5

http:
  method: GET
  url: https://boardgamegeek.com/xmlapi2/user?name=Sgrumo&domain=boardgame
  params:
    - name: name
      value: Sgrumo
      type: query
    - name: domain
      value: boardgame
      type: query
  auth:
    type: bearer
    token: "{{BGG_BEARER_TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
