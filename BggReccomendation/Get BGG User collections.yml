info:
  name: Get BGG User collections
  type: http
  seq: 7

http:
  method: GET
  url: https://boardgamegeek.com/xmlapi2/plays?username=Sgrumo&subtype=boardgame
  params:
    - name: username
      value: Sgrumo
      type: query
    - name: subtype
      value: boardgame
      type: query
  auth:
    type: bearer
    token: "{{BGG_BEARER_TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
